<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title data-i18n-content="optionsTitle">Find and Remove Duplicate Messages - Settings</title>
  <style>
    body {
      font: message-box;
      margin: 20px;
      max-width: 760px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 1.05rem;
      margin-top: 24px;
      margin-bottom: 10px;
    }

    fieldset {
      border: 1px solid #cfcfd4;
      padding: 14px 16px;
      margin: 0 0 16px 0;
    }

    legend {
      font-weight: 600;
      padding: 0 6px;
    }

    .row {
      margin: 10px 0;
    }

    .indent {
      margin-left: 26px;
    }

    .note {
      color: #555;
      font-size: 0.95em;
    }

    .actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    #status {
      color: #0a6b2d;
    }
  </style>
</head>
<body>
  <h1 data-i18n-content="optionsTitle">Find and Remove Duplicate Messages - Settings</h1>

  <fieldset>
    <legend data-i18n-content="generalSettingsLegend">General Settings</legend>

    <div class="row">
      <label>
        <input type="checkbox" id="skipSpecialFolders" />
        <span data-i18n-content="skipSpecialFolders">
        Skip Special Folders (Sent, Drafts etc.)
        </span>
      </label>
    </div>

    <div class="row">
      <label>
        <input type="checkbox" id="skipImapDeleted" />
        <span data-i18n-content="skipImapDeleted">
        Skip IMAP messages marked "Deleted"
        </span>
      </label>
    </div>

    <div class="row">
      <label>
        <input type="checkbox" id="searchSubfolders" />
        <span data-i18n-content="searchSubfolders">
        Search subfolders of selected top folder(s)
        </span>
      </label>
    </div>

    <div class="row">
      <label>
        <input type="checkbox" id="reviewBeforeDeletion" />
        <span data-i18n-content="reviewBeforeDeletion">
        Review search results before deletion
        </span>
      </label>
    </div>

    <div class="row">
      <div><strong data-i18n-content="defaultActionLabel">Default action for duplicate messages:</strong></div>
    </div>

    <div class="row indent">
      <label>
        <input type="radio" name="defaultAction" value="trash" />
        <span data-i18n-content="moveToTrash">
        Move to Trash
        </span>
      </label>
    </div>

    <div class="row indent">
      <label>
        <input type="radio" name="defaultAction" value="permanent" />
        <span data-i18n-content="deletePermanently">
        Delete permanently
        </span>
      </label>
    </div>
  </fieldset>

  <fieldset>
    <legend data-i18n-content="messageComparisonLegend">Message Comparison</legend>

    <div class="row">
      <label>
        <input type="checkbox" id="compareSubject" /> 
        <span data-i18n-content="subject">Subject</span>
      </label>
    </div>

    <div class="row">
      <label>
        <input type="checkbox" id="compareAuthor" />
        <span data-i18n-content="author">Author</span>
      </label>
    </div>

    <div class="row">
      <label>
        <input type="checkbox" id="compareRecipients" />
        <span data-i18n-content="recipients">Recipients</span>
      </label>
    </div>

    <div class="row">
      <label>
        <input type="checkbox" id="compareCc" />
        <span data-i18n-content="cc">CC</span>
      </label>
    </div>

    <div class="row">
      <label>
        <input type="checkbox" id="compareSendTime" />
        <span data-i18n-content="sendTime">Send Time</span>
      </label>
    </div>

    <div class="row indent">
      <label for="sendTimeResolution" data-i18n-content="sendTimeResolution">
        Send time resolution:
      </label>
    
      <select id="sendTimeResolution">
        <option value="second" data-i18n-content="second">Second</option>
        <option value="minute" data-i18n-content="minute">Minute</option>
        <option value="hour" data-i18n-content="hour">Hour</option>
        <option value="day" data-i18n-content="day">Day</option>
        <option value="month" data-i18n-content="month">Month</option>
        <option value="year" data-i18n-content="year">Year</option>
      </select>
    </div>

    <div class="row">
      <label>
        <input type="checkbox" id="compareMessageId" />
        <span data-i18n-content="messageId">Message ID</span>
      </label>
    </div>

    <div class="row">
      <label>
        <input type="checkbox" id="compareFolder" />
        <span data-i18n-content="folder">Folder</span>
      </label>
    </div>

    <div class="row">
      <label>
        <input type="checkbox" id="compareBody" />
        <span data-i18n-content="body">Body</span>
      </label>
    </div>

    <div class="row">
      <label>
        <input type="checkbox" id="stripAndSortAddresses" />
        <span data-i18n-content="stripAndSortAddresses">Compare addresses stripped and sorted</span>
      </label>
    </div>

    <div class="note" data-i18n-content="bodyComparisonNote">
      Body comparison is more expensive and should be done after other criteria narrow the candidates.
    </div>
  </fieldset>

  <div class="actions">
    <button id="save" data-i18n-content="save">Save</button>
    <button id="reset" type="button" data-i18n-content="resetToDefaults">Reset to Defaults</button>
    <span id="status"></span>
  </div>

  <script src="../settings.js"></script>
  <script type="module" src="options.js"></script>
</body>
</html>
