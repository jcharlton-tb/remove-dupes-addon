<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title data-i18n-content="dialogTitle">Duplicate Scan Results</title>

  <!-- Webawesome theme -->
  <link rel="stylesheet" href="./vendor/webawesome/styles/webawesome.css">
  <link rel="stylesheet" href="./vendor/webawesome/styles/native.css">

  <!-- Webawesome components -->
  <script type="module" src="./vendor/webawesome/components/button/button.js"></script>

  <style>
    body {
      margin: 0;
      font: message-box;
      background: #ffffff; 
      color: var(--wa-color-text-normal, #111);
    }

    .page {
      padding: 16px;
    }

    .header {
      margin: 0 0 12px 0;
    }

    .title {
      margin: 0 0 8px 0;
      font-size: 1.1rem;
      font-weight: 600;
    }

    .meta {
      margin: 0 0 12px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 10px;
      border-bottom: 1px solid rgba(0, 0, 0, .20);
      border-right: 1px solid rgba(0, 0, 0, .20);
      vertical-align: top;
    }

    th {
      text-align: left;
      white-space: nowrap;
    }

    th:last-child,
    td:last-child {
      border-right: none;
    }

    .subject {
      word-break: break-word;
    }

    .count {
      text-align: right;
      width: 120px;
    }

    table thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #e9eef6;
      font-weight: 600;
      border-bottom: 2px solid rgba(0, 0, 0, .20);
    }

    .table-wrap {
      max-height: 60vh;
      overflow: auto;
    }

    tbody tr:hover {
      background: rgba(0, 0, 0, .04);
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 0 20px 0;
    }

    .spinner {
      width: 20px;
      height: 20px;
      flex: 0 0 auto;
    }

    #loading-text {
      color: #444;
    }

    #loading[hidden] {
      display: none !important;
    }

    #results-wrap[hidden] {
      display: none !important;
    }

    .footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 16px;
    }

    wa-button[variant="primary"]::part(base) {
      background: #0a84ff;
      border-color: #0a84ff;
      color: white;
    }

    wa-button[variant="primary"]::part(base):hover {
      background: #006fe0;
      border-color: #006fe0;
      color: white;
    }

    wa-button[variant="text"]::part(base) {
      color: #0a84ff;
      background: transparent;
      border: none;
    }

    wa-button[variant="text"]::part(base):hover {
      color: #006fe0;
      background: transparent;
    }

    wa-button[variant="text"][data-static]::part(base) {
      cursor: default;
      opacity: 0.8;
    }

    wa-button[variant="text"]::part(base) {
      background: transparent !important;
    }

    th wa-button {
      display: block;
      width: 100%;
    }

    wa-button[variant="text"]::part(base) {
      width: 100%;
      justify-content: flex-start;
      background: transparent !important;
      border: none;
      box-shadow: none; 
    }
 
    wa-button.active-criterion::part(base) {
      background: #dce9ff !important;
      font-weight: 700;
    }
    
    .active-criterion {
      background: #dce9ff !important;
      font-weight: 700;
    }    
  </style>
</head>

<body>
  <div class="page">
    <div class="header">
      <h1 class="title" data-i18n-content="dialogTitle">Duplicate Scan Results</h1>
      <p class="meta" id="meta"></p>
      <p class="meta" id="scan-summary"></p>
    </div>

    <div id="loading" class="loading">
      <img
        id="spinner"
        class="spinner"
        src="spinner.gif"
        alt="Loading"
        data-i18n-alt="loadingAlt"
      />
      <div id="loading-text" data-i18n-content="loadingText">Scanning folder…</div>
    </div>

    <div class="table-wrap" id="results-wrap" hidden>
      <table>
        <thead>
          <tr>
            <th id="th-subject">
            <wa-button variant="text" size="small" id="sort-subject" data-i18n-content="subjectColumn">
              Subject
            </wa-button>
            </th>

            <th id="th-author">
            <wa-button variant="text" size="small" id="sort-author">
            Author
            </wa-button>
            </th>

            <th id="th-folder">
            <wa-button variant="text" size="small" id="sort-folder">
            Folder
            </wa-button>
            </th>

            <th id="th-date">
            <wa-button variant="text" size="small" id="sort-date">
            Date
            </wa-button>
            </th>

            <th id="th-count" class="count" aria-sort="none">
            <wa-button variant="text" size="small" id="sort-count" data-i18n-content="countColumn">
              Count
            </wa-button>
            </th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>

    <div class="footer">
      <wa-button variant="primary" id="close" data-i18n-content="close">
        Close
      </wa-button>
    </div>
  </div>

  <script type="module" src="dialog.js"></script>
</body>
</html>
